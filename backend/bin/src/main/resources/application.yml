server:
  port: 8080
  tomcat:
    max-swallow-size: -1
  # allow large CSV uploads (millions of records -> large files)
  max-http-header-size: 16KB

spring:
  application:
    name: product-verification-system

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pvs}
    username: ${DB_USER:pvs_user}
    password: ${DB_PASSWORD:pvs_password}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate   # schema owned by Flyway, not Hibernate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 500
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 2GB
      max-request-size: 2GB
      file-size-threshold: 10MB

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-super-secret-key-for-production-min-256-bits}
    expiration-ms: 86400000   # 24h
  storage:
    image-dir: ${IMAGE_STORAGE_DIR:./uploaded-images}
  csv:
    batch-size: 5000
    thread-pool-size: 4
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.pvs: INFO
