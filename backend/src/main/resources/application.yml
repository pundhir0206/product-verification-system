server:
  port: 8080

  max-http-request-header-size: 16KB

  tomcat:
    max-swallow-size: -1
    max-http-form-post-size: 2GB

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/pvs_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${SPRING_DATASOURCE_USERNAME:pvs_user}
    password: ${SPRING_DATASOURCE_PASSWORD:pvs_password}   
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      pool-name: PvsHikariPool
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: false

  jpa:
    open-in-view: false
    show-sql: true

    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        format_sql: true

        jdbc:
          batch_size: 500
          batch_versioned_data: true

        order_inserts: true
        order_updates: true

        generate_statistics: false

  flyway:
    enabled: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 2GB
      max-request-size: 2GB
      file-size-threshold: 10MB

app:
  jwt:
    secret: ${JWT_SECRET:change-this-super-secret-key-for-development-minimum-256-bits}
    expiration-ms: 86400000

  storage:
    image-dir: ./uploaded-images

  csv:
    batch-size: 500
    thread-pool-size: 4

  cors:
    allowed-origins: http://localhost:5173

management:
  endpoint:
    health:
      show-details: always

  health:
    redis:
      enabled: false

  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.pvs: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE